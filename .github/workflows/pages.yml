name: Deploy to GitHub Pages

# Publish via GitHub Actions instead of the legacy branch build.
# This bypasses the ~10-builds/hour soft limit of "Deploy from a branch".

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let a running one finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # the whole repo is the static site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
